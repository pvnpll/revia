services:
  postgres:
    image: postgres:16-alpine
    container_name: revia-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: revia
    volumes:
      - revia_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d revia"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  revia_pgdata:
